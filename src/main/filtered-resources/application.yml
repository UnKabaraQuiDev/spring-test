app:
  name: "%project.name%"
  message: "Hello from ${app.name}"
  remember-me:
    key: spring-test
    ttl: 30d

loki:
  url: ${LOKI_URL:http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push}

stripe:
  api:
    key: ${STRIPE_API_KEY:}
  webhook:
    secret: ${STRIPE_WH_SEC:}

frontend:
  dir: ${FRONTEND_DIR:./app/frontend/}

pclib:
  db:
    enabled: true
    expose-database: true
    expose-connector: true
    auto-create: true

    postgres:
      protocol: "postgres"
      name: "${DB_NAME:spring_test_postgres}"
      username: "${DB_USER}"
      password: "${DB_PASS}"
      host: "${DB_HOST:localhost}"
      port: "${DB_PORT:5432}"

spring:
  application:
    name: "%project.artifactId%"
#    version: "%project.version%"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 2000ms

  session:
    store-type: redis
    timeout: 12h
    redis:
      namespace: "${app.name}:session"
      flush-mode: on-save

  cache:
    type: redis
    redis:
      key-prefix: "${app.name}:cache:"
      time-to-live: 30m
      use-key-prefix: true

server:
  port: ${PORT_PUBLIC:8080}
  servlet:
    session:
      cookie:
        name: ${app.name}-session
        http-only: true
        same-site: lax
        secure: false
    remember-me:
      cookie:
        name: ${app.name}-uid

management:
  server:
    port: ${PORT_MANAGEMENT:8081}

  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    lu.kbra: DEBUG