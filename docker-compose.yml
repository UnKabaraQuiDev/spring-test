services:

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}

    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    volumes:
      - redis-data:/data

    command: ["redis-server", "--appendonly", "yes"]

  app:
    build: .

    depends_on:
      - postgres
      - redis

    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_HOST: postgres

      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WH_SECRET: ${STRIPE_WH_SECRET}

      REDIS_PORT: 6379
      REDIS_HOST: redis

      PORT_PUBLIC: 8080
      PORT_MANAGEMENT: 8081

    ports:
      - "8080:8080"

volumes:
  postgres-data:
  redis-data:
